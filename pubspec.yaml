name: summit_stories
description: Collect peaks, memories and stories from every corner of Bulgaria.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod:       ^2.5.1
  firebase_core:          ^3.3.0
  firebase_auth:          ^5.1.4
  cloud_firestore:        ^5.2.1
  firebase_storage:       ^12.1.3
  hive:                   ^2.2.3
  hive_flutter:           ^1.1.0
  google_maps_flutter:    ^2.7.0
  geolocator:             ^12.0.0
  permission_handler:     ^11.3.1
  image_picker:           ^1.1.2
  cached_network_image:   ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#241735"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Karla
      fonts:
        - asset: assets/fonts/Karla-Regular.ttf
          weight: 400
        - asset: assets/fonts/Karla-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Karla-Bold.ttf
          weight: 700

  assets:
    - assets/pois.json
    - assets/images/
    - assets/images/demo/
    - assets/icon/